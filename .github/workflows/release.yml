name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. V4.1.1)'
        required: true
        default: 'V4.1.1'
      release_notes:
        description: 'Release notes'
        required: false
        default: ''

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create tag and release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          body: ${{ github.event.inputs.release_notes }}
          draft: false
          prerelease: false
          make_latest: true
